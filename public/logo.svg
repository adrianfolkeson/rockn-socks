<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 90">
  <defs>
    <linearGradient id="pinkPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="30%" stop-color="#F43F5E"/>
      <stop offset="70%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#EC4899" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Wide, shorter heart -->
  <path d="M70 88 C25 55, -8 40, 8 18 C22 0, 58 12, 70 32 C82 12, 118 0, 132 18 C148 40, 115 55, 70 88Z" 
        fill="url(#pinkPurple)" filter="url(#glow)"/>
  
  <!-- Inner highlight -->
  <ellipse cx="45" cy="30" rx="14" ry="8" fill="white" opacity="0.25" transform="rotate(-20 45 30)"/>
  
  <!-- Text -->
  <text x="70" y="52" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" 
        fill="white" text-anchor="middle">Rock'N</text>
  <text x="70" y="68" font-family="Arial, sans-serif" font-size="12" font-weight="bold" 
        fill="white" text-anchor="middle" opacity="0.95">Socks</text>
  
  <!-- Sparkles -->
  <circle cx="115" cy="18" r="5" fill="white" opacity="0.6"/>
  <circle cx="25" cy="28" r="3" fill="white" opacity="0.4"/>
</svg>
