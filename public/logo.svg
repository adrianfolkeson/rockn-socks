<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
  <defs>
    <!-- Main gradient - pink to purple -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="50%" stop-color="#F43F5E"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#EC4899" flood-opacity="0.4"/>
    </filter>
    
    <!-- Text shadow -->
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Abstract sock shape - stylized wave/ribbon -->
  <path d="M20 50 
           Q30 20, 50 30 
           Q70 40, 80 25 
           Q90 10, 110 20 
           Q130 30, 140 50 
           Q130 70, 110 60 
           Q90 50, 80 65 
           Q70 80, 50 70 
           Q30 60, 20 50Z" 
        fill="url(#mainGrad)" filter="url(#glow)"/>
  
  <!-- Inner pattern - stripes -->
  <path d="M40 45 Q50 35, 60 40 Q70 45, 80 38 Q90 32, 100 40"
        stroke="white" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M50 55 Q60 48, 75 52 Q90 56, 100 50"
        stroke="white" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M45 65 Q55 58, 70 62"
        stroke="white" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Shine effect -->
  <ellipse cx="45" cy="35" rx="12" ry="6" fill="white" opacity="0.3" transform="rotate(-20 45 35)"/>
  
  <!-- Text -->
  <text x="155" y="55" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" 
        fill="url(#mainGrad)" text-anchor="middle" filter="url(#textShadow)">Strump</text>
  <text x="155" y="78" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" 
        fill="url(#mainGrad)" text-anchor="middle" filter="url(#textShadow)">mix</text>
  
  <!-- Small decorative dots -->
  <circle cx="170" cy="35" r="3" fill="#EC4899" opacity="0.6"/>
  <circle cx="180" cy="45" r="2" fill="#F43F5E" opacity="0.5"/>
  <circle cx="175" cy="60" r="2" fill="#A855F7" opacity="0.5"/>
</svg>
