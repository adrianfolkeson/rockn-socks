<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 80">
  <defs>
    <linearGradient id="pinkPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="30%" stop-color="#F43F5E"/>
      <stop offset="70%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#EC4899" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Compact wide heart -->
  <path d="M70 75 C30 48, 0 35, 12 15 C24 0, 55 8, 70 25 C85 8, 116 0, 128 15 C140 35, 110 48, 70 75Z" 
        fill="url(#pinkPurple)" filter="url(#glow)"/>
  
  <!-- Inner highlight -->
  <ellipse cx="45" cy="25" rx="10" ry="6" fill="white" opacity="0.25" transform="rotate(-20 45 25)"/>
  
  <!-- Text -->
  <text x="70" y="42" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" 
        fill="white" text-anchor="middle">Rock'N</text>
  <text x="70" y="55" font-family="Arial, sans-serif" font-size="9" font-weight="bold" 
        fill="white" text-anchor="middle" opacity="0.95">Socks</text>
  
  <!-- Sparkles -->
  <circle cx="118" cy="12" r="3" fill="white" opacity="0.6"/>
  <circle cx="22" cy="22" r="2" fill="white" opacity="0.4"/>
</svg>
