<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="pinkPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="30%" stop-color="#F43F5E"/>
      <stop offset="70%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#EC4899" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Weird asymmetrical heart -->
  <path d="M60 108 C18 68, -8 42, 14 18 C34 -4, 58 5, 60 28 C62 5, 86 -4, 106 18 C128 42, 102 68, 60 108Z" 
        fill="url(#pinkPurple)" filter="url(#glow)"/>
  
  <!-- Inner glow/highlight -->
  <path d="M55 90 C25 58, 10 45, 22 28 C34 12, 52 18, 55 35 C50 28, 40 22, 32 28 C24 34, 28 48, 52 78 C48 68, 44 55, 46 45 C50 32, 55 28, 58 38 C55 30, 62 25, 72 30 C82 35, 78 48, 65 72 C85 50, 90 38, 82 28 C74 18, 65 22, 60 32 C65 22, 80 18, 92 30 C104 42, 88 58, 60 90Z" 
        fill="white" opacity="0.2"/>
  
  <!-- Text -->
  <text x="60" y="65" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" 
        fill="white" text-anchor="middle" letter-spacing="0.5">Rock'N</text>
  <text x="60" y="80" font-family="Arial, sans-serif" font-size="10" font-weight="bold" 
        fill="white" text-anchor="middle" opacity="0.95">Socks</text>
  
  <!-- Sparkles -->
  <circle cx="95" cy="25" r="5" fill="white" opacity="0.7"/>
  <circle cx="25" cy="38" r="3" fill="white" opacity="0.5"/>
  <circle cx="100" cy="55" r="2" fill="white" opacity="0.4"/>
</svg>
