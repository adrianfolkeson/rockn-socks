<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 80">
  <defs>
    <linearGradient id="sockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#BE185D" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Sock shape -->
  <path d="M25 15 L25 55 Q25 70 45 70 L65 70 Q85 70 85 55 L85 35 Q85 20 65 20 L45 20 L45 15 Z" 
        fill="white" stroke="url(#sockGrad)" stroke-width="4" filter="url(#shadow)"/>
  
  <!-- Sock pattern dots -->
  <circle cx="40" cy="32" r="4" fill="#EC4899"/>
  <circle cx="55" cy="32" r="4" fill="#EC4899"/>
  <circle cx="70" cy="32" r="4" fill="#EC4899"/>
  <circle cx="47" cy="45" r="4" fill="#EC4899"/>
  <circle cx="62" cy="45" r="4" fill="#EC4899"/>
  <circle cx="55" cy="58" r="4" fill="#EC4899"/>
  
  <!-- Rock hand sign -->
  <text x="55" y="14" font-size="10" fill="#BE185D" text-anchor="middle">🤘</text>
  
  <!-- Text -->
  <text x="110" y="38" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#1E293B">Rock'N</text>
  <text x="110" y="55" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#EC4899">Socks</text>
</svg>
