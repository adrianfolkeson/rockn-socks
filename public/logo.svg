<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 80">
  <defs>
    <linearGradient id="pinkFlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="40%" stop-color="#F43F5E"/>
      <stop offset="100%" stop-color="#C026D3"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#EC4899" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Modern sock shape - flowing and clean -->
  <path d="M35 15 
           L35 50 
           Q35 68 55 68 
           L85 68 
           Q105 68 105 50 
           L105 30 
           Q105 12 85 12 
           L55 12 
           L55 15 
           Q55 8 48 8 
           L48 8 
           Q35 8 35 15 Z" 
        fill="url(#pinkFlow)" filter="url(#softShadow)"/>
  
  <!-- Clean white cuff -->
  <path d="M32 12 L32 22 Q32 26 36 26 L104 26 Q108 26 108 22 L108 12 Q108 8 104 8 L36 8 Q32 8 32 12 Z" 
        fill="white"/>
  
  <!-- Minimal pattern - 3 neat dots -->
  <circle cx="50" cy="38" r="5" fill="white" opacity="0.9"/>
  <circle cx="70" cy="38" r="5" fill="white" opacity="0.9"/>
  <circle cx="90" cy="38" r="5" fill="white" opacity="0.9"/>
  <circle cx="60" cy="55" r="5" fill="white" opacity="0.9"/>
  <circle cx="80" cy="55" r="5" fill="white" opacity="0.9"/>
  
  <!-- Subtle shine -->
  <ellipse cx="45" cy="30" rx="8" ry="5" fill="white" opacity="0.25" transform="rotate(-15 45 30)"/>
</svg>
