<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 100">
  <defs>
    <linearGradient id="pinkPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="50%" stop-color="#F43F5E"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#EC4899" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Weird heart shape - like a whale/bird flying -->
  <path d="M70 95 C25 60, -5 40, 10 18 C25 0, 55 8, 70 28 C85 8, 115 0, 130 18 C145 40, 115 60, 70 95Z" 
        fill="url(#pinkPurple)" filter="url(#glow)"/>
  
  <!-- Inner highlight - wing/swimming feel -->
  <ellipse cx="40" cy="32" rx="14" ry="8" fill="white" opacity="0.25" transform="rotate(-20 40 32)"/>
  
  <!-- Text faded into heart -->
  <text x="70" y="50" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" 
        fill="white" text-anchor="middle" opacity="0.9" letter-spacing="0.5">Rock'N</text>
  <text x="70" y="65" font-family="Arial, sans-serif" font-size="9" font-weight="bold" 
        fill="white" text-anchor="middle" opacity="0.75">Socks</text>
  
  <!-- Sparkles -->
  <circle cx="110" cy="20" r="4" fill="white" opacity="0.6"/>
  <circle cx="30" cy="35" r="3" fill="white" opacity="0.4"/>
  <circle cx="100" cy="50" r="2" fill="white" opacity="0.3"/>
</svg>
