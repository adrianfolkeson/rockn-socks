<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  
  <!-- Stylized sock icon - geometric/retro -->
  <g transform="translate(10, 10)">
    <!-- Sock body -->
    <path d="M15 5 L15 45 Q15 60 30 60 L50 60 Q70 60 70 45 L70 35 Q70 25 60 20 L35 15 Q25 13 20 8 Z" 
          fill="none" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Stripes (retro feel) -->
    <line x1="20" y1="20" x2="35" y2="23" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="22" y1="30" x2="40" y2="33" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="40" x2="45" y2="43" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Toe highlight -->
    <circle cx="62" cy="40" r="8" fill="url(#grad)" opacity="0.3"/>
  </g>
  
  <!-- Text -->
  <text x="95" y="52" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="32" fill="#1e1e1e" letter-spacing="-1">
    Strumpmix
  </text>
  
  <!-- Subtle underline accent -->
  <rect x="95" y="62" width="130" height="3" rx="1.5" fill="url(#grad)"/>
</svg>